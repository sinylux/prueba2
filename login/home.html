<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body class="bodyCalculadora">
    <div class="card-calculator">
      <h1>Calculadora</h1>

      <div class="inputs">
        <input type="number" id="num1" placeholder="0.0" />
        <input type="number" id="num2" placeholder="0.0" />
      </div>

      <div class="resultado">
        <p > = <span id="resultado">0.0</span></p>
      </div>
      

      <div class="botones">
        <button class="boton" id="sumar">sumar</button>
        <button class="boton" id="restar">restar</button>
        <button class="boton" id="multiplicar">multiplicar</button>
        <button class="boton" id="dividir">dividir</button>
      </div>
    </div>
  </body>
</html>

<script>
  const botones = document.querySelectorAll(".boton");

  for (let boton of botones) {
    boton.addEventListener("click", calcular);
  }

  function calcular(e) {
    let num1 = parseFloat(document.getElementById("num1").value);
    let num2 = parseFloat(document.getElementById("num2").value);
    let resultado = 0;

    if (isNaN(num1) || isNaN(num2)) {
      document.getElementById("resultado").innerText = "Ingrese numeros";
    } else {
      switch (e.target.id) {
        case "sumar":
          resultado = num1 + num2;
          break;
        case "restar":
          resultado = num1 - num2;
          break;
        case "multiplicar":
          resultado = num1 * num2;
          break;
        case "dividir":
          if (num2 === 0) {
            document.getElementById("resultado").innerText =
              "No se puede dividir por cero";
            return;
          } else {
            resultado = num1 / num2;
          }

          break;
      }
      document.getElementById("resultado").innerText = resultado;
    }
  }
</script>
